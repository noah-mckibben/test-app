version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: YourPassword123!
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  api:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mssql
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__DefaultConnection: "Server=mssql;Database=ContactCenterApp;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      Jwt__Secret: "your-development-secret-key-change-in-production"
      Twilio__AccountSid: "${TWILIO_ACCOUNT_SID:-}"
      Twilio__AuthToken: "${TWILIO_AUTH_TOKEN:-}"
      Twilio__PhoneNumber: "${TWILIO_PHONE_NUMBER:-}"

volumes:
  mssql_data: