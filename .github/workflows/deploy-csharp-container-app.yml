name: Deploy C# Container App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Azure CLI
        uses: azure/setup-azure-cli@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run deployment script
        env:
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          ACR_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}
          KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: bash deploy-to-azure.sh

      - name: Get deployment URL
        run: |
          CONTAINER_APP_NAME="test-app-container"
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"
          echo "Deployment Status:"
          az containerapp show \
            --name ${CONTAINER_APP_NAME} \
            --resource-group ${RESOURCE_GROUP} \
            --query "{name: name, status: properties.runningStatus, url: properties.configuration.ingress.fqdn}" \
            -o table
