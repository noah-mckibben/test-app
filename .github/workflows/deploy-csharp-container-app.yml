name: Deploy C# Container App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push Docker image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/contact-center-app:${{ github.sha }}
            ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/contact-center-app:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp registry set \
            --name contact-center-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io \
            --username ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }} \
            --password ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

          # Get the FQDN for CORS configuration
          FQDN=$(az containerapp show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name contact-center-app \
            --query properties.configuration.ingress.fqdn -o tsv)

          az containerapp update \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name contact-center-app \
            --image ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/contact-center-app:${{ github.sha }} \
            --set-env-vars \
              ConnectionStrings__DefaultConnection="${{ secrets.SQL_SERVER_CONNECTION_STRING }}" \
              Jwt__Secret="${{ secrets.JWT_SECRET }}" \
              Twilio__AccountSid="${{ secrets.TWILIO_ACCOUNT_SID }}" \
              Twilio__AuthToken="${{ secrets.TWILIO_AUTH_TOKEN }}" \
              Twilio__PhoneNumber="${{ secrets.TWILIO_PHONE_NUMBER }}" \
              AzureUrl="https://$FQDN"

      - name: Verify deployment
        run: |
          az containerapp show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name contact-center-app \
            --query properties.configuration.ingress.fqdn
